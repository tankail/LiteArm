# This config file is used by ros2_control for real hardware (right arm only)
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: false  # CRITICAL: Use system time for real hardware

    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

joint_state_broadcaster:
  ros__parameters:
    use_sim_time: false

right_arm_controller:
  ros__parameters:
    use_sim_time: false  # Use system time
    joints:
      - r_joint1_joint
      - r_joint2_joint
      - r_joint3_joint
      - r_joint4_joint
      - r_joint5_joint
      - r_joint6_joint
      - r_joint7_joint

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: true
    allow_integration_in_goal_trajectories: true

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

right_gripper_controller:
  ros__parameters:
    use_sim_time: false  # Use system time
    joints:
      - r_r_finger_joint

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    allow_partial_joints_goal: false

    # Gains for position control
    gains:
      r_r_finger_joint:
        p: 1.0
        i: 0.0
        d: 0.0
        i_clamp: 0.0

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      r_r_finger_joint:
        trajectory: 0.05
        goal: 0.02